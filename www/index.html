<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: gap: https://ssl.gstatic.com https://188b143btrial.launchpad.cfapps.us10.hana.ondemand.com 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/index.css">
    <title>BTB</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #00091C;
            font-family: Arial, sans-serif;
        }

        #body {
            position: fixed;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 50% 40%, rgba(9, 95, 187, 0.25), transparent 34%),
                linear-gradient(180deg, #00091C 0%, #071426 100%);
        }

        #content-holder {
            height: 300px;
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translate(0, -50%);
            text-align: center;
        }

        a {
            color: #4BBA4F;
            text-decoration: none;
            font-weight: 900;
            font-size: 17px;
        }

        #statusText {
            color: #D8E2EC;
            letter-spacing: .04em;
            margin: 18px 0;
        }

        .brand-logo {
            display: block;
            margin: auto;
            max-width: min(78vw, 360px);
            width: 360px;
        }
    </style>
</head>

<body>
    <div id="body">
        <div id="content-holder">
            <img src="img/pleasewait.gif" alt="Please wait" width="80">
            <h4 id="statusText">Please wait...</h4>
            <img class="brand-logo" src="img/logo.png" alt="BTB">
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
